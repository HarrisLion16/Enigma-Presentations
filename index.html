<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENIGMA - Presentations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: #0A0E17; }

  :root {
    --bg: #0A0E17;
    --card: #111827;
    --gold: #FFD930;
    --cyan: #06B6D4;
    --white: #F9FAFB;
    --muted: #9CA3AF;
    --error: #EF4444;
    --card-border: #1F2937;
  }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--white);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* ---- Token Entry Screen ---- */
  .screen { display: none; width: 100%; }
  .screen.active { display: flex; }

  #token-screen {
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    min-height: 100dvh;
    padding: 24px;
  }

  .token-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 48px 40px;
    max-width: 420px;
    width: 100%;
    text-align: center;
  }

  .logo {
    display: block;
    max-height: 80px;
    max-width: 100%;
    width: auto;
    height: auto;
    margin: 0 auto 16px;
    filter: drop-shadow(0 0 30px rgba(255,217,48,0.1));
  }

  .subtitle {
    font-size: 0.95rem;
    font-weight: 400;
    color: var(--muted);
    margin-bottom: 36px;
  }

  .input-group {
    width: 100%;
    margin-bottom: 20px;
  }

  .input-group input {
    width: 100%;
    padding: 14px 16px;
    background: var(--bg);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    color: var(--white);
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .input-group input::placeholder {
    color: var(--muted);
  }

  .input-group input:focus {
    border-color: var(--gold);
  }

  .btn-gold {
    width: 100%;
    padding: 14px 24px;
    background: var(--gold);
    color: var(--bg);
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }

  .btn-gold:hover { opacity: 0.9; }
  .btn-gold:active { transform: scale(0.98); }
  .btn-gold:disabled { opacity: 0.5; cursor: not-allowed; }

  .error-msg {
    color: var(--error);
    font-size: 0.85rem;
    margin-top: 16px;
    min-height: 1.2em;
  }

  /* ---- Deck Selection Screen ---- */
  #deck-screen {
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    min-height: 100dvh;
    padding: 24px;
  }

  .deck-header {
    text-align: center;
    padding-top: 48px;
    margin-bottom: 48px;
  }

  .deck-header .logo {
    max-height: 80px;
    margin-bottom: 16px;
  }

  .deck-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
    max-width: 700px;
    width: 100%;
  }

  .deck-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 28px 24px;
    cursor: pointer;
    transition: border-color 0.25s, transform 0.15s;
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .deck-card-text {
    flex: 1;
  }

  .deck-card-icon {
    width: 100px;
    height: 100px;
    flex-shrink: 0;
    opacity: 0.85;
  }

  .deck-card-icon svg {
    width: 100%;
    height: 100%;
  }

  .deck-card:hover {
    border-color: var(--cyan);
    transform: translateY(-2px);
  }

  .deck-card h3 {
    font-size: 1.15rem;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--white);
  }

  .deck-card p {
    font-size: 0.88rem;
    color: var(--muted);
    line-height: 1.5;
  }

  .deck-card .tag {
    display: inline-block;
    margin-top: 14px;
    font-size: 0.72rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--cyan);
    background: rgba(6, 182, 212, 0.1);
    padding: 4px 10px;
    border-radius: 6px;
  }

  /* ---- Loading Overlay ---- */
  .loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
  }

  .loading-overlay.active { display: flex; }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--card-border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 0.9rem;
    color: var(--muted);
  }

  /* ---- Deck Viewer ---- */
  #deck-viewer {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: none;
    background: var(--bg);
  }

  #deck-viewer.active { display: block; }

  #deck-viewer iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  .viewer-back {
    position: fixed;
    bottom: 24px;
    left: 24px;
    z-index: 210;
    padding: 8px 16px;
    background: rgba(17, 24, 39, 0.85);
    backdrop-filter: blur(8px);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    color: var(--white);
    font-family: 'Inter', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .viewer-back:hover { border-color: var(--gold); }

  /* ---- Sign Out ---- */
  .sign-out {
    position: fixed;
    top: 20px;
    right: 24px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Inter', sans-serif;
    font-size: 0.82rem;
    cursor: pointer;
    transition: color 0.2s;
    z-index: 50;
  }

  .sign-out:hover { color: var(--white); }

  /* ---- Responsive ---- */
  @media (max-width: 480px) {
    .token-card { padding: 36px 24px; }
    .logo { max-height: 56px; }
    .deck-header { padding-top: 32px; margin-bottom: 32px; }
    .deck-card-icon { width: 60px; height: 60px; }
  }

  /* ---- Mobile Portrait Overlay ---- */
  .rotate-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #0A0E17;
    z-index: 10000;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px;
  }

  .rotate-overlay .rotate-icon {
    width: 80px;
    height: 80px;
    margin-bottom: 24px;
    animation: rotateNudge 2s ease-in-out infinite;
  }

  @keyframes rotateNudge {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(90deg); }
    50%, 75% { transform: rotate(90deg); }
  }

  .rotate-overlay .rotate-title {
    font: 700 24px/1.3 'Inter', system-ui, -apple-system, sans-serif;
    color: #FFFFFF;
    margin-bottom: 12px;
  }

  .rotate-overlay .rotate-text {
    font: 400 16px/1.5 'Inter', system-ui, -apple-system, sans-serif;
    color: #9CA3AF;
    max-width: 280px;
  }

  @media (max-width: 1024px) and (orientation: portrait) {
    .rotate-overlay {
      display: flex;
    }
  }
</style>
</head>

  // ---- Deck Registry ----

    {

  // ---- DOM refs ----
  var tokenScreen  = document.getElementById('token-screen');
  var deckScreen   = document.getElementById('deck-screen');
  var tokenInput   = document.getElementById('token-input');
  var tokenSubmit  = document.getElementById('token-submit');
  var tokenError   = document.getElementById('token-error');
  var deckGrid     = document.getElementById('deck-grid');
  var signOutBtn   = document.getElementById('sign-out-btn');
  var loadingEl    = document.getElementById('loading');
  var deckViewer   = document.getElementById('deck-viewer');
  var deckIframe   = document.getElementById('deck-iframe');
  var viewerBack   = document.getElementById('viewer-back');

  var currentToken = '';

  // ---- Screen helpers ----
  function showScreen(screen) {
    tokenScreen.classList.remove('active');
    deckScreen.classList.remove('active');
    screen.classList.add('active');
  }

  function showLoading(show) {
    loadingEl.classList.toggle('active', show);
  }

  function showError(msg) {
    tokenError.textContent = msg;
  }

  function clearToken() {
    currentToken = '';
    localStorage.removeItem('enigma_gh_token');
  }

  // ---- Token validation ----
  function validateToken(token, callback) {
    fetch('https://api.github.com/repos/HarrisLion16/Enigma-Presentations', {
      headers: { 'Authorization': 'Bearer ' + token }
    })
    .then(function (res) {
      if (res.status === 401 || res.status === 403) {
        callback(false);
      } else if (res.ok) {
        callback(true);
      } else {
        callback(false);
      }
    })
    .catch(function () {
      callback(false);
    });
  }

  // ---- Render deck cards ----
  function renderDecks() {
    deckGrid.innerHTML = '';
    DECKS.forEach(function (deck) {
      var card = document.createElement('div');
      card.className = 'deck-card';
      card.innerHTML =
        '<div class="deck-card-text">' +
          '<h3>' + deck.title + '</h3>' +
          '<p>' + deck.description + '</p>' +
          '<span class="tag">' + deck.tag + '</span>' +
        '</div>' +
        '<div class="deck-card-icon">' + deck.icon + '</div>';
      card.addEventListener('click', function () { loadDeck(deck); });
      deckGrid.appendChild(card);
    });
  }

  // ---- Load a deck ----
  function loadDeck(deck) {
    showLoading(true);

    var url = 'https://raw.githubusercontent.com/HarrisLion16/Enigma-Presentations/main/' + deck.path;

    fetch(url)
    .then(function (res) {
      if (res.status === 401 || res.status === 403) {
        showLoading(false);
        clearToken();
        showScreen(tokenScreen);
        showError('Invalid or expired token');
        return null;
      }
      if (res.status === 404) {
        showLoading(false);
        alert('Deck not found');
        return null;
      }
      if (!res.ok) {
        showLoading(false);
        alert('Failed to load deck (HTTP ' + res.status + ')');
        return null;
      }
      return res.text();
    })
    .then(function (html) {
      if (!html) return;
      showLoading(false);
      deckIframe.srcdoc = html;
      deckViewer.classList.add('active');
    })
    .catch(function (err) {
      showLoading(false);
      alert('Network error loading deck');
    });
  }

  // ---- Auth flow ----
  function authenticate(token) {
    if (!token || !token.trim()) {
      showError('Please enter a token');
      return;
    }

    token = token.trim();
    tokenSubmit.disabled = true;
    showError('');

    validateToken(token, function (valid) {
      tokenSubmit.disabled = false;
      if (valid) {
        currentToken = token;
        localStorage.setItem('enigma_gh_token', token);
        showError('');
        renderDecks();
        showScreen(deckScreen);
      } else {
        clearToken();
        showError('Invalid or expired token');
      }
    });
  }

  // ---- Event listeners ----
  tokenSubmit.addEventListener('click', function () {
    authenticate(tokenInput.value);
  });

  tokenInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') {
      authenticate(tokenInput.value);
    }
  });

  signOutBtn.addEventListener('click', function () {
    clearToken();
    tokenInput.value = '';
    showError('');
    showScreen(tokenScreen);
  });

  viewerBack.addEventListener('click', function () {
    deckViewer.classList.remove('active');
    deckIframe.srcdoc = '';
  });

  // ---- Init ----
  var storedToken = localStorage.getItem('enigma_gh_token');
  if (storedToken) {
    showLoading(true);
    validateToken(storedToken, function (valid) {
      showLoading(false);
      if (valid) {
        currentToken = storedToken;
        renderDecks();
        showScreen(deckScreen);
      } else {
        clearToken();
        showScreen(tokenScreen);
        showError('Stored token is no longer valid');
      }
    });
  } else {
    showScreen(tokenScreen);
  }

})();
</script>

</body>
</html>
